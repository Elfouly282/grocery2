name: grocery2
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1

  # Routing
  go_router: ^17.2.1

  # Dependency Injection
  get_it: ^9.2.1

  # Functional programming
  fpdart: ^1.2.0

  # UI & utilities
  flutter_screenutil: ^5.9.3
  gap: ^3.0.1
  google_fonts: ^6.2.1

  # Networking
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0

  # Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # Models helpers
  equatable: ^2.0.8

  # Images
  image_picker: ^1.2.1

  # Intl
  intl: ^0.20.2

  # UI extras
  carousel_slider: ^5.1.2
  pinput: ^5.0.0
  skeletonizer: ^2.1.3

  # Phone input
  flutter_intl_phone_field: ^0.0.7
  intl_phone_field: ^3.2.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/