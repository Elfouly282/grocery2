  # Navigation
  go_router: ^13.0.0

  # Utilities
  equatable: ^2.0.5
  get_it: ^7.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  #  (Assets)
  assets:
    - assets/images/
